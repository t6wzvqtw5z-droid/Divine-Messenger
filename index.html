<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Divine Messenger — Божественный чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0A0A0A;
            height: 100vh;
            overflow: hidden;
            color: #FFFFFF;
        }

        /* Главный контейнер */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #0A0A0A;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.1);
        }

        /* Шапка */
        .header {
            padding: 16px 20px;
            background: #0A0A0A;
            border-bottom: 1px solid #1F1F1F;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00FF88, #00CC66);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #FFFFFF, #00FF88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            color: #00FF88;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover {
            transform: scale(1.1);
            text-shadow: 0 0 8px #00FF88;
        }

        /* Список чатов */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            gap: 14px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #141414;
        }

        .chat-item:hover {
            background: #141414;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #1F1F1F, #2A2A2A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 1px solid #2A2A2A;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #FFFFFF;
        }

        .chat-preview {
            font-size: 13px;
            color: #888888;
            display: flex;
            gap: 8px;
        }

        .chat-time {
            font-size: 11px;
            color: #555555;
        }

        .badge {
            background: #00FF88;
            color: #0A0A0A;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
        }

        /* Экран чата (изначально скрыт) */
        .chat-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0A0A0A;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        .chat-header {
            padding: 12px 20px;
            background: #0A0A0A;
            border-bottom: 1px solid #1F1F1F;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #00FF88;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .chat-title {
            flex: 1;
            font-weight: 600;
            font-size: 17px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Пузырьки сообщений */
        .message {
            display: flex;
            max-width: 80%;
        }

        .my-message {
            align-self: flex-end;
            justify-content: flex-end;
        }

        .their-message {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .my-bubble {
            background: #00FF88;
            color: #0A0A0A;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 255, 136, 0.2);
        }

        .their-bubble {
            background: #1F1F1F;
            color: #FFFFFF;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: #666;
            margin-top: 4px;
            text-align: right;
        }

        /* Панель ввода */
        .input-bar {
            padding: 12px 16px;
            background: #0A0A0A;
            border-top: 1px solid #1F1F1F;
            display: flex;
            gap: 12px;
            align-items: center;
            backdrop-filter: blur(20px);
        }

        .input-field {
            flex: 1;
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 28px;
            padding: 12px 18px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .input-field:focus {
            border-color: #00FF88;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
        }

        .send-btn {
            background: #00FF88;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            color: #0A0A0A;
            font-weight: bold;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 12px #00FF88;
        }

        /* Настройки */
        .settings-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0A0A0A;
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        .settings-item {
            padding: 16px 20px;
            border-bottom: 1px solid #141414;
            display: flex;
            justify-content: space-between;
            color: white;
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message {
            animation: fadeIn 0.25s ease;
        }

        /* Стилизация скролла */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1A1A;
        }
        ::-webkit-scrollbar-thumb {
            background: #00FF88;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- Список чатов -->
    <div id="chatsScreen" style="display: flex; flex-direction: column; height: 100%;">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">✦</div>
                <div class="logo-text">Divine</div>
            </div>
            <div class="header-actions">
                <div class="icon-btn" id="settingsBtn">⚙️</div>
                <div class="icon-btn" id="newChatBtn">✚</div>
            </div>
        </div>
        <div class="chats-list" id="chatsList">
            <!-- Динамические чаты -->
        </div>
    </div>

    <!-- Экран чата -->
    <div id="chatScreen" class="chat-screen">
        <div class="chat-header">
            <button class="back-btn" id="backToChats">←</button>
            <div class="chat-title" id="chatTitle">Загрузка...</div>
            <div class="icon-btn" style="font-size: 20px;">⋮</div>
        </div>
        <div class="messages-area" id="messagesArea">
            <!-- Сообщения -->
        </div>
        <div class="input-bar">
            <input type="text" class="input-field" id="messageInput" placeholder="Divine сообщение...">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <!-- Экран настроек -->
    <div id="settingsScreen" class="settings-screen">
        <div class="chat-header">
            <button class="back-btn" id="backFromSettings">←</button>
            <div class="chat-title">Настройки</div>
        </div>
        <div class="settings-item">
            <span>🌟 Божественная тема</span>
            <span>Вкл</span>
        </div>
        <div class="settings-item">
            <span>🔒 Сквозное шифрование</span>
            <span>Active (E2EE)</span>
        </div>
        <div class="settings-item">
            <span>🎨 Цвет своих сообщений</span>
            <span style="color:#00FF88;">● Neo Green</span>
        </div>
        <div class="settings-item">
            <span>👤 Имя профиля</span>
            <span>Divine User</span>
        </div>
        <div class="settings-item">
            <span>🌙 Тёмная магия</span>
            <span>Включена</span>
        </div>
        <div class="settings-item">
            <span>⚡ Анимации</span>
            <span>Божественные</span>
        </div>
    </div>
</div>

<script>
    // ---------- БОЖЕСТВЕННЫЕ ДАННЫЕ ----------
    let currentChatId = null;
    
    // Чаты
    let chats = [
        { id: 1, name: "⭐ Ангельский отряд", avatar: "👼", lastMessage: "Да будет свет!", time: "12:30", unread: 2 },
        { id: 2, name: "✨ Избранные души", avatar: "✨", lastMessage: "Молитва в 20:00", time: "11:15", unread: 0 },
        { id: 3, name: "🌙 Лунный совет", avatar: "🌙", lastMessage: "Тёмное пророчество", time: "Вчера", unread: 5 },
        { id: 4, name: "🔥 Серафимы кода", avatar: "🔥", lastMessage: "Push в рай", time: "Вчера", unread: 1 },
        { id: 5, name: "💎 Divine Devs", avatar: "💎", lastMessage: "Гитхаб освящён", time: "Пн", unread: 0 }
    ];

    // Сообщения (ключ = id чата)
    let messagesDB = {
        1: [
            { text: "Святой вечер, братья!", isMe: false, time: "12:28" },
            { text: "И вам мир ✨", isMe: true, time: "12:29" },
            { text: "Когда новый Divine релиз?", isMe: false, time: "12:30" }
        ],
        2: [
            { text: "Красота неземная...", isMe: false, time: "10:58" },
            { text: "Согласен, градиенты 🔥", isMe: true, time: "11:02" }
        ],
        3: [
            { text: "Луна растёт", isMe: false, time: "23:15" },
            { text: "Сила внутри нас", isMe: true, time: "23:16" },
            { text: "⚡ Тьма отступает", isMe: false, time: "23:17" }
        ],
        4: [
            { text: "Код написан кровью?", isMe: false, time: "13:40" },
            { text: "Нет, слезами ангелов", isMe: true, time: "13:42" }
        ],
        5: [
            { text: "Flutter или React?", isMe: false, time: "09:12" },
            { text: "Divine Flutter ✦", isMe: true, time: "09:19" }
        ]
    };

    // Функция отрисовки списка чатов
    function renderChats() {
        const container = document.getElementById('chatsList');
        if (!container) return;
        container.innerHTML = '';
        chats.forEach(chat => {
            const lastMsgObj = messagesDB[chat.id]?.[messagesDB[chat.id].length - 1];
            const preview = lastMsgObj ? (lastMsgObj.text.length > 35 ? lastMsgObj.text.substring(0, 32) + '...' : lastMsgObj.text) : "Нет сообщений";
            const unreadBadge = chat.unread > 0 ? `<span class="badge">${chat.unread}</span>` : '';
            const chatDiv = document.createElement('div');
            chatDiv.className = 'chat-item';
            chatDiv.setAttribute('data-id', chat.id);
            chatDiv.innerHTML = `
                <div class="chat-avatar">${chat.avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">${chat.name} ${unreadBadge}</div>
                    <div class="chat-preview">
                        <span>${preview}</span>
                        <span class="chat-time">${chat.time}</span>
                    </div>
                </div>
            `;
            chatDiv.addEventListener('click', () => openChat(chat.id, chat.name));
            container.appendChild(chatDiv);
        });
    }

    // Открыть чат
    function openChat(chatId, chatName) {
        currentChatId = chatId;
        document.getElementById('chatsScreen').style.display = 'none';
        const chatScreen = document.getElementById('chatScreen');
        chatScreen.style.display = 'flex';
        document.getElementById('chatTitle').innerText = chatName;
        renderMessages(chatId);
        
        // Сбрасываем unread
        const chat = chats.find(c => c.id === chatId);
        if (chat && chat.unread > 0) {
            chat.unread = 0;
            renderChats();
        }
    }

    // Рендер сообщений
    function renderMessages(chatId) {
        const container = document.getElementById('messagesArea');
        if (!container) return;
        const msgs = messagesDB[chatId] || [];
        container.innerHTML = '';
        msgs.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.isMe ? 'my-message' : 'their-message'}`;
            msgDiv.innerHTML = `
                <div class="bubble ${msg.isMe ? 'my-bubble' : 'their-bubble'}">
                    ${msg.text}
                    <div class="message-time">${msg.time}</div>
                </div>
            `;
            container.appendChild(msgDiv);
        });
        // Скролл вниз
        setTimeout(() => {
            container.scrollTop = container.scrollHeight;
        }, 50);
    }

    // Отправить сообщение
    function sendMessage() {
        if (currentChatId === null) return;
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (text === "") return;
        
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        const newMsg = {
            text: text,
            isMe: true,
            time: timeStr
        };
        
        if (!messagesDB[currentChatId]) messagesDB[currentChatId] = [];
        messagesDB[currentChatId].push(newMsg);
        
        // Имитация ответа через 1-3 секунды (божественное провидение ✨)
        renderMessages(currentChatId);
        input.value = '';
        
        // Обновляем последнее сообщение в списке чатов
        const chat = chats.find(c => c.id === currentChatId);
        if (chat) {
            chat.lastMessage = text;
            chat.time = timeStr;
            renderChats();
        }
        
        // Божественный ответ (иногда)
        const shouldReply = Math.random() > 0.55;
        if (shouldReply) {
            setTimeout(() => {
                const divineAnswers = ["Так и есть ✨", "Божественно! 🌟", "Свет истины", "🙏 Благословляю", "Сияй, дитя", "Divine одобряет 💚", "✨ Магия кода"];
                const randomAnswer = divineAnswers[Math.floor(Math.random() * divineAnswers.length)];
                const answerTime = new Date();
                const ansTimeStr = `${answerTime.getHours().toString().padStart(2,'0')}:${answerTime.getMinutes().toString().padStart(2,'0')}`;
                const replyMsg = {
                    text: randomAnswer,
                    isMe: false,
                    time: ansTimeStr
                };
                messagesDB[currentChatId].push(replyMsg);
                renderMessages(currentChatId);
                
                // Обновляем предпросмотр и время
                if (chat) {
                    chat.lastMessage = randomAnswer;
                    chat.time = ansTimeStr;
                    renderChats();
                }
            }, 1200 + Math.random() * 2000);
        }
    }

    // Навигация
    function showChats() {
        document.getElementById('chatScreen').style.display = 'none';
        document.getElementById('settingsScreen').style.display = 'none';
        document.getElementById('chatsScreen').style.display = 'flex';
        currentChatId = null;
        renderChats();
    }
    
    function showSettings() {
        document.getElementById('chatsScreen').style.display = 'none';
        document.getElementById('chatScreen').style.display = 'none';
        document.getElementById('settingsScreen').style.display = 'flex';
    }

    // Инициализация событий
    document.getElementById('backToChats')?.addEventListener('click', showChats);
    document.getElementById('backFromSettings')?.addEventListener('click', showChats);
    document.getElementById('settingsBtn')?.addEventListener('click', showSettings);
    document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
    document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    document.getElementById('newChatBtn')?.addEventListener('click', () => {
        alert("✨ Новая божественная беседа появится в следующем обновлении. Пока сияй в существующих!");
    });

    // Старт
    renderChats();
</script>
</body>
</html>
