<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Divine — мессенджер с нейросетью</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e17;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            color: #eef2ff;
            line-height: 1.5;
        }

        .mobile-container {
            max-width: 500px;
            margin: 0 auto;
            background: #0f1420;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .header {
            padding: 16px 20px;
            background: #0a0e17;
            border-bottom: 1px solid #1f2a3e;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #7bc9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            color: #5bc0ff;
            margin-right: 6px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a2332;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a2332;
            border-radius: 30px;
            padding: 10px 16px;
        }

        .search-bar i {
            color: #6e7c9e;
            font-size: 16px;
        }

        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .search-bar input::placeholder {
            color: #6e7c9e;
        }

        .stories-row {
            padding: 16px 20px;
            display: flex;
            gap: 16px;
            overflow-x: auto;
            border-bottom: 1px solid #1f2a3e;
        }

        .story-item {
            text-align: center;
            cursor: pointer;
        }

        .story-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f5b042, #ff6680);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
            border: 2px solid #ffdd88;
        }

        .story-circle.add-story {
            background: #1a2332;
            border: 2px dashed #5bc0ff;
        }

        .story-circle i {
            font-size: 28px;
            color: white;
        }

        .story-name {
            font-size: 11px;
            color: #9aabca;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: block;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid #1e2538;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-item:hover {
            background: #1a2332;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5bc0ff, #2f80ed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
        }

        .chat-avatar.bot {
            background: linear-gradient(135deg, #f0b042, #ff6680);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .chat-last-msg {
            font-size: 13px;
            color: #8a9ac0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .chat-time {
            font-size: 11px;
            color: #6e7c9e;
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 20px;
            background: #0a0e17;
            border-top: 1px solid #1f2a3e;
            position: sticky;
            bottom: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #6e7c9e;
            cursor: pointer;
            transition: 0.2s;
            font-size: 12px;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: #5bc0ff;
        }

        .chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f1420;
            z-index: 200;
            max-width: 500px;
            margin: 0 auto;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: #0a0e17;
            border-bottom: 1px solid #1f2a3e;
        }

        .back-btn {
            background: none;
            border: none;
            color: #5bc0ff;
            font-size: 22px;
            cursor: pointer;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: 600;
            font-size: 18px;
        }

        .chat-header-status {
            font-size: 12px;
            color: #6e7c9e;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
        }

        .message.user {
            background: #2f80ed;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.bot, .message.other {
            background: #1a2332;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            color: #8a9ac0;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
            padding: 12px 20px 20px;
            background: #0a0e17;
            border-top: 1px solid #1f2a3e;
        }

        .chat-input-area input {
            flex: 1;
            background: #1a2332;
            border: none;
            border-radius: 30px;
            padding: 12px 18px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .chat-input-area button {
            background: #2f80ed;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .search-results {
            display: none;
            position: absolute;
            top: 110px;
            left: 20px;
            right: 20px;
            background: #1a2332;
            border-radius: 20px;
            padding: 12px;
            z-index: 150;
            border: 1px solid #2a3450;
        }

        .search-result-item {
            padding: 12px;
            border-bottom: 1px solid #2a3450;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 24px;
            background: #0f1420;
        }

        .auth-card {
            background: #1a2332;
            border-radius: 48px;
            padding: 40px 28px;
            width: 100%;
            border: 1px solid #ffd966;
            box-shadow: 0 0 20px rgba(255,200,80,0.2);
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 28px;
            font-size: 28px;
        }

        .auth-card input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #ffda88;
            background: #0a0e17;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }

        .auth-card button {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            background: linear-gradient(135deg, #f0b042, #ffdd88);
            border: none;
            font-weight: 700;
            font-size: 16px;
            color: #1a1f2e;
            cursor: pointer;
            margin-top: 8px;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #8a9ac0;
            cursor: pointer;
        }

        .auth-switch span {
            color: #5bc0ff;
        }

        .error-msg {
            color: #ff8888;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }

        .app-screen {
            display: none;
        }

        .stories-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            z-index: 300;
            align-items: center;
            justify-content: center;
        }

        .story-content {
            font-size: 32px;
            text-align: center;
            padding: 40px;
        }

        .close-stories {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .calls-container {
            padding: 20px;
        }
        .call-card {
            background: #1a2332;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="mobile-container" id="mobileContainer">
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h2><i class="fas fa-feather-alt"></i> Divine</h2>
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Никнейм">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button onclick="login()">Войти</button>
                <div class="auth-switch" onclick="showRegister()">Нет аккаунта? <span>Зарегистрироваться</span></div>
                <div id="loginError" class="error-msg"></div>
            </div>
            <div id="registerForm" style="display:none;">
                <input type="text" id="regUsername" placeholder="Никнейм (мин. 3 символа)">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 4 символа)">
                <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль">
                <button onclick="register()">Зарегистрироваться</button>
                <div class="auth-switch" onclick="showLogin()">Уже есть аккаунт? <span>Войти</span></div>
                <div id="regError" class="error-msg"></div>
            </div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="appScreen" class="app-screen">
        <div class="header">
            <div class="header-top">
                <div class="logo"><i class="fas fa-feather-alt"></i> Divine</div>
                <div class="user-badge" id="userBadge"></div>
            </div>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Поиск по никнейму..." oninput="searchUsers()">
            </div>
        </div>

        <!-- Stories -->
        <div id="storiesContainer">
            <div class="stories-row" id="storiesRow">
                <div class="story-item" onclick="openStory('my')">
                    <div class="story-circle add-story"><i class="fas fa-plus"></i></div>
                    <div class="story-name">Моя история</div>
                </div>
                <div class="story-item" onclick="openStory('friend')">
                    <div class="story-circle"><i class="fas fa-user"></i></div>
                    <div class="story-name">Анна</div>
                </div>
            </div>
        </div>

        <!-- Chat List -->
        <div id="chatListContainer">
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active" data-tab="chats" onclick="switchTab('chats')">
                <i class="fas fa-comment"></i>
                <span>Чаты</span>
            </div>
            <div class="nav-item" data-tab="stories" onclick="switchTab('stories')">
                <i class="fas fa-star"></i>
                <span>Сторис</span>
            </div>
            <div class="nav-item" data-tab="calls" onclick="switchTab('calls')">
                <i class="fas fa-phone"></i>
                <span>Звонки</span>
            </div>
            <div class="nav-item" data-tab="profile" onclick="switchTab('profile')">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="chat-screen">
        <div class="chat-header">
            <button class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></button>
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatHeaderName">Divine Bot</div>
                <div class="chat-header-status" id="chatHeaderStatus">онлайн, нейросеть</div>
            </div>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Search Results -->
    <div id="searchResults" class="search-results"></div>

    <!-- Stories Viewer -->
    <div id="storiesViewer" class="stories-viewer">
        <button class="close-stories" onclick="closeStories()"><i class="fas fa-times"></i></button>
        <div class="story-content" id="storyContent"></div>
    </div>
</div>

<script>
    // ========== DATA ==========
    let users = JSON.parse(localStorage.getItem('divine_users') || '{}');
    let currentUser = localStorage.getItem('divine_current_user');
    let chatMessages = JSON.parse(localStorage.getItem('divine_chat_messages') || '{"divine_bot": []}');
    let privateChats = JSON.parse(localStorage.getItem('divine_private_chats') || '{}');
    let stories = JSON.parse(localStorage.getItem('divine_stories') || '[]');

    // Bot responses
    const botResponses = {
        default: "Я нейросеть Divine Bot! 😊 Задай любой вопрос, я помогу.",
        hello: "Привет! Рад тебя видеть в Divine! Чем могу помочь?",
        how: "Я работаю отлично! А как твои дела?",
        name: "Я Divine Bot — твой виртуальный помощник!",
        help: "Вот что я умею:\n• Отвечать на вопросы\n• Рассказывать новости\n• Помогать с настройками Divine\nПросто напиши что нужно!",
        news: "Divine обновляется! Скоро появятся голосовые сообщения и видеозвонки в группах до 50 человек! 🚀",
        thanks: "Пожалуйста! Всегда рад помочь 😊",
        love: "Спасибо! Ты тоже крутой пользователь Divine! 💙"
    };

    function getBotReply(text) {
        const msg = text.toLowerCase();
        if (msg.match(/привет|здравствуй|здарова|hi|hello/i)) return botResponses.hello;
        if (msg.match(/как дела|как ты|как жизнь/i)) return botResponses.how;
        if (msg.match(/кто ты|ты кто|имя/i)) return botResponses.name;
        if (msg.match(/помощь|команды|что умеешь|help/i)) return botResponses.help;
        if (msg.match(/новости|обновления|что нового/i)) return botResponses.news;
        if (msg.match(/спасибо|благодарю|thx|thanks/i)) return botResponses.thanks;
        if (msg.match(/люблю|ты лучший|классный/i)) return botResponses.love;
        return `📡 Получил твой запрос: "${text}".\n\nЯ нейросеть Divine Bot. Спрашивай что угодно! ${botResponses.default}`;
    }

    function saveMessages() {
        localStorage.setItem('divine_chat_messages', JSON.stringify(chatMessages));
        localStorage.setItem('divine_private_chats', JSON.stringify(privateChats));
    }

    function renderMessages(chatId, chatType) {
        const container = document.getElementById('messagesArea');
        if (!container) return;
        
        let messages = [];
        if (chatType === 'bot') {
            messages = chatMessages[chatId] || [];
        } else {
            messages = privateChats[chatId] || [];
        }
        
        container.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            let senderClass = '';
            if (msg.sender === currentUser) {
                senderClass = 'user';
            } else if (msg.sender === 'bot') {
                senderClass = 'bot';
            } else {
                senderClass = 'other';
            }
            div.className = `message ${senderClass}`;
            div.innerHTML = `
                <div>${escapeHtml(msg.text)}</div>
                <div class="message-time">${msg.time}</div>
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
        updateLastMessage(chatId, chatType);
    }

    function updateLastMessage(chatId, chatType) {
        if (chatType === 'bot') {
            const messages = chatMessages[chatId] || [];
            if (messages.length > 0 && chatId === 'divine_bot') {
                const lastMsg = messages[messages.length - 1];
                const botLastMsgSpan = document.getElementById('botLastMsg');
                if (botLastMsgSpan) {
                    botLastMsgSpan.innerText = lastMsg.text.substring(0, 40) + (lastMsg.text.length > 40 ? '...' : '');
                }
            }
        } else {
            // Update private chat in sidebar
            const messages = privateChats[chatId] || [];
            if (messages.length > 0) {
                const lastMsg = messages[messages.length - 1];
                const sidebarItem = document.querySelector(`.chat-item[data-chat-id="${chatId}"] .chat-last-msg`);
                if (sidebarItem) {
                    sidebarItem.innerText = lastMsg.text.substring(0, 40) + (lastMsg.text.length > 40 ? '...' : '');
                }
            }
        }
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const currentChatObj = window.currentChat;
        if (!currentChatObj) return;

        const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

        if (currentChatObj.type === 'bot') {
            if (!chatMessages[currentChatObj.id]) chatMessages[currentChatObj.id] = [];
            chatMessages[currentChatObj.id].push({sender: currentUser, text: text, time: time});
            saveMessages();
            renderMessages(currentChatObj.id, 'bot');
            input.value = '';

            setTimeout(() => {
                const botReply = getBotReply(text);
                const botTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                chatMessages[currentChatObj.id].push({sender: 'bot', text: botReply, time: botTime});
                saveMessages();
                renderMessages(currentChatObj.id, 'bot');
            }, 500);
        } else {
            if (!privateChats[currentChatObj.id]) privateChats[currentChatObj.id] = [];
            privateChats[currentChatObj.id].push({sender: currentUser, text: text, time: time});
            saveMessages();
            renderMessages(currentChatObj.id, 'private');
            input.value = '';
        }
    }

    function openChat(chatId, name, type, isBot = false) {
        window.currentChat = {id: chatId, name: name, type: type, isBot: isBot};
        document.getElementById('chatHeaderName').innerText = name;
        document.getElementById('chatHeaderStatus').innerText = isBot ? 'онлайн, нейросеть' : 'пользователь Divine';
        
        if (isBot) {
            if (!chatMessages[chatId]) chatMessages[chatId] = [];
            renderMessages(chatId, 'bot');
        } else {
            if (!privateChats[chatId]) privateChats[chatId] = [];
            renderMessages(chatId, 'private');
        }
        
        document.getElementById('chatScreen').style.display = 'flex';
        document.getElementById('appScreen').style.display = 'none';
    }

    function closeChat() {
        document.getElementById('chatScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        renderChatList();
    }

    function renderChatList() {
        const container = document.getElementById('chatList');
        if (!container) return;
        
        // Bot chat always first
        let html = `
            <div class="chat-item" data-chat-id="divine_bot" onclick="openChat('divine_bot', 'Divine Bot', 'bot', true)">
                <div class="chat-avatar bot">🤖</div>
                <div class="chat-info">
                    <div class="chat-name">Divine Bot 🤖</div>
                    <div class="chat-last-msg" id="botLastMsg">${chatMessages['divine_bot'] && chatMessages['divine_bot'].length > 0 ? chatMessages['divine_bot'][chatMessages['divine_bot'].length-1].text.substring(0,40) : 'Напиши мне что-нибудь!'}</div>
                </div>
                <div class="chat-time">сейчас</div>
            </div>
        `;
        
        // Private chats with other users
        for (const [otherUser, messages] of Object.entries(privateChats)) {
            if (messages.length > 0) {
                const lastMsg = messages[messages.length-1];
                html += `
                    <div class="chat-item" data-chat-id="${otherUser}" onclick="openChat('${otherUser}', '${otherUser}', 'private', false)">
                        <div class="chat-avatar">${otherUser.charAt(0).toUpperCase()}</div>
                        <div class="chat-info">
                            <div class="chat-name">${otherUser}</div>
                            <div class="chat-last-msg">${lastMsg.text.substring(0,40)}</div>
                        </div>
                        <div class="chat-time">${lastMsg.time}</div>
                    </div>
                `;
            }
        }
        
        container.innerHTML = html;
    }

    function switchTab(tab) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');

        const storiesContainer = document.getElementById('storiesContainer');
        const chatListContainer = document.getElementById('chatListContainer');
        
        if (tab === 'chats') {
            storiesContainer.style.display = 'block';
            chatListContainer.style.display = 'block';
            renderChatList();
        } else if (tab === 'stories') {
            storiesContainer.style.display = 'block';
            chatListContainer.style.display = 'none';
        } else if (tab === 'calls') {
            storiesContainer.style.display = 'none';
            chatListContainer.style.display = 'block';
            const container = document.getElementById('chatList');
            container.innerHTML = `
                <div class="calls-container">
                    <div class="call-card" onclick="makeCall('video')">
                        <i class="fas fa-video" style="font-size: 28px; color:#5bc0ff;"></i>
                        <div><strong>Видеозвонок</strong><br><span style="font-size:12px; color:#8a9ac0;">E2EE шифрование</span></div>
                    </div>
                    <div class="call-card" onclick="makeCall('audio')">
                        <i class="fas fa-phone" style="font-size: 28px; color:#5bc0ff;"></i>
                        <div><strong>Аудиозвонок</strong><br><span style="font-size:12px; color:#8a9ac0;">Сквозное шифрование</span></div>
                    </div>
                    <div class="call-card" onclick="makeCall('group')">
                        <i class="fas fa-users" style="font-size: 28px; color:#5bc0ff;"></i>
                        <div><strong>Групповой вызов</strong><br><span style="font-size:12px; color:#8a9ac0;">До 30 участников</span></div>
                    </div>
                </div>
            `;
        } else if (tab === 'profile') {
            storiesContainer.style.display = 'none';
            chatListContainer.style.display = 'block';
            const container = document.getElementById('chatList');
            container.innerHTML = `
                <div class="chat-item">
                    <div class="chat-avatar">${currentUser ? currentUser.charAt(0).toUpperCase() : 'U'}</div>
                    <div class="chat-info">
                        <div class="chat-name">${currentUser || 'Пользователь'}</div>
                        <div class="chat-last-msg">@${currentUser || 'username'}</div>
                    </div>
                </div>
                <div class="chat-item">
                    <div class="chat-avatar"><i class="fas fa-shield-alt"></i></div>
                    <div class="chat-info">
                        <div class="chat-name">E2EE шифрование</div>
                        <div class="chat-last-msg">Ваши данные защищены</div>
                    </div>
                </div>
                <div class="chat-item">
                    <div class="chat-avatar"><i class="fas fa-cloud"></i></div>
                    <div class="chat-info">
                        <div class="chat-name">Облако 2 ГБ</div>
                        <div class="chat-last-msg">Свободно 2 ГБ</div>
                    </div>
                </div>
                <div class="chat-item" onclick="logout()">
                    <div class="chat-avatar"><i class="fas fa-sign-out-alt"></i></div>
                    <div class="chat-info">
                        <div class="chat-name">Выйти из аккаунта</div>
                        <div class="chat-last-msg">Завершить сессию</div>
                    </div>
                </div>
            `;
        }
    }

    function makeCall(type) {
        let msg = '';
        if (type === 'video') msg = '📹 Видеозвонок с E2EE шифрованием\n(демо-режим)';
        else if (type === 'audio') msg = '📞 Аудиозвонок с E2EE шифрованием\n(демо-режим)';
        else msg = '👥 Групповой вызов до 30 участников\nСквозное шифрование включено';
        alert(msg);
    }

    function searchUsers() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        const resultsDiv = document.getElementById('searchResults');
        if (!query) {
            resultsDiv.style.display = 'none';
            return;
        }
        const foundUsers = Object.keys(users).filter(u => u.toLowerCase().includes(query) && u !== currentUser);
        if (foundUsers.length > 0) {
            resultsDiv.innerHTML = foundUsers.map(u => `
                <div class="search-result-item" onclick="startChatWith('${u}')">
                    <i class="fas fa-user-circle" style="font-size: 32px; color:#5bc0ff;"></i>
                    <div>
                        <div><strong>${escapeHtml(u)}</strong></div>
                        <div style="font-size: 12px; color:#8a9ac0;">Нажмите для чата</div>
                    </div>
                </div>
            `).join('');
            resultsDiv.style.display = 'block';
        } else {
            resultsDiv.innerHTML = '<div class="search-result-item">👤 Пользователи не найдены</div>';
            resultsDiv.style.display = 'block';
        }
    }

    function startChatWith(username) {
        document.getElementById('searchResults').style.display = 'none';
        document.getElementById('searchInput').value = '';
        if (!privateChats[username]) {
            privateChats[username] = [];
            saveMessages();
        }
        openChat(username, username, 'private', false);
    }

    function openStory(type) {
        const viewer = document.getElementById('storiesViewer');
        const content = document.getElementById('storyContent');
        if (type === 'my') {
            content.innerHTML = '<div>📸 Твоя история<br><br>Нажми + чтобы добавить фото или видео</div>';
        } else {
            content.innerHTML = '<div>✨ История Анны<br><br>Последнее обновление: сегодня</div>';
        }
        viewer.style.display = 'flex';
    }

    function closeStories() {
        document.getElementById('storiesViewer').style.display = 'none';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ========== AUTH ==========
    function saveUsers() {
        localStorage.setItem('divine_users', JSON.stringify(users));
    }

    function register() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regPasswordConfirm').value;
        const errorDiv = document.getElementById('regError');

        if (!username || username.length < 3) {
            errorDiv.innerText = '❌ Никнейм минимум 3 символа';
            return;
        }
        if (!password || password.length < 4) {
            errorDiv.innerText = '❌ Пароль минимум 4 символа';
            return;
        }
        if (password !== confirm) {
            errorDiv.innerText = '❌ Пароли не совпадают';
            return;
        }
        if (users[username]) {
            errorDiv.innerText = '❌ Пользователь уже существует';
            return;
        }

        users[username] = {password: btoa(password), createdAt: new Date().toISOString()};
        saveUsers();
        localStorage.setItem('divine_current_user', username);
        currentUser = username;
        initApp();
    }

    function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');

        if (!users[username] || users[username].password !== btoa(password)) {
            errorDiv.innerText = '❌ Неверный никнейм или пароль';
            return;
        }

        localStorage.setItem('divine_current_user', username);
        currentUser = username;
        initApp();
    }

    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    }

    function showLogin() {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
    }

    function logout() {
        localStorage.removeItem('divine_current_user');
        currentUser = null;
        document.getElementById('appScreen').style.display = 'none';
        document.getElementById('authScreen').style.display = 'flex';
    }

    function initApp() {
        if (currentUser) {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'block';
            document.getElementById('userBadge').innerHTML = `<i class="fas fa-user-circle"></i> ${escapeHtml(currentUser)}`;
            renderChatList();
            switchTab('chats');
        }
    }

    // Initialize
    if (currentUser) {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        document.getElementById('userBadge').innerHTML = `<i class="fas fa-user-circle"></i> ${escapeHtml(currentUser)}`;
        renderChatList();
    } else {
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('appScreen').style.display = 'none';
    }

    // Add demo users if empty
    if (Object.keys(users).length === 0) {
        users = {
            'demo': {password: btoa('1234'), createdAt: new Date().toISOString()},
            'alex': {password: btoa('1234'), createdAt: new Date().toISOString()},
            'anna': {password: btoa('1234'), createdAt: new Date().toISOString()}
        };
        saveUsers();
    }
</script>
</body>
</html>
